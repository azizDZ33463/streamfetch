name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      build_macos:
        description: "Also build macOS artifact"
        required: false
        default: false
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  YTDLP_VERSION: "2025.01.15"

jobs:
  build:
    if: ${{ matrix.platform != 'macos' || github.event_name != 'workflow_dispatch' || inputs.build_macos == true }}
    continue-on-error: ${{ matrix.platform == 'macos' }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runner: windows-latest
          - platform: linux
            runner: ubuntu-latest
          - platform: macos
            runner: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $tag = [string]$env:GITHUB_REF_NAME
          if ([string]::IsNullOrWhiteSpace($tag)) {
            Write-Error "GITHUB_REF_NAME is empty for tag build."
            exit 1
          }

          $tagVersion = $tag -replace '^v', ''
          $pkg = Get-Content -Raw "package.json" | ConvertFrom-Json
          $pkgVersion = [string]$pkg.version

          if ([string]::IsNullOrWhiteSpace($pkgVersion)) {
            Write-Error "package.json version is missing."
            exit 1
          }

          if ($tagVersion -ne $pkgVersion) {
            Write-Error "Tag version '$tagVersion' does not match package.json version '$pkgVersion'."
            exit 1
          }

          Write-Host "Version guard passed: tag '$tag' matches package.json version '$pkgVersion'."

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Bundle Windows binaries
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          choco install ffmpeg -y --no-progress
          New-Item -ItemType Directory -Force -Path bin | Out-Null

          $ffmpegCandidates = Get-ChildItem -Path "$env:ChocolateyInstall\lib" -Filter "ffmpeg.exe" -Recurse -File -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "\\tools\\.*\\bin\\ffmpeg\.exe$" }
          if (-not $ffmpegCandidates) {
            Write-Error "Could not find FFmpeg binary in Chocolatey package files."
            exit 1
          }

          $ffmpegFile = $ffmpegCandidates | Sort-Object Length -Descending | Select-Object -First 1
          if ($ffmpegFile.Length -lt 50MB) {
            Write-Error "Resolved FFmpeg binary is too small ($($ffmpegFile.Length) bytes)."
            exit 1
          }
          Copy-Item $ffmpegFile.FullName "bin/ffmpeg.exe" -Force
          Write-Host "Bundled FFmpeg: $([Math]::Round((Get-Item 'bin/ffmpeg.exe').Length / 1MB, 2)) MB"

          $baseUrl = "https://github.com/yt-dlp/yt-dlp/releases/download/$env:YTDLP_VERSION"
          Invoke-WebRequest -Uri "$baseUrl/yt-dlp.exe" -OutFile "bin/yt-dlp.exe"
          Invoke-WebRequest -Uri "$baseUrl/SHA2-256SUMS" -OutFile "bin/SHA2-256SUMS"

          $checksumLine = Select-String -Path "bin/SHA2-256SUMS" -Pattern '^([a-fA-F0-9]{64})\s+\*?yt-dlp\.exe$' | Select-Object -First 1
          if (-not $checksumLine) {
            Write-Error "Could not find checksum for yt-dlp.exe in SHA2-256SUMS."
            exit 1
          }
          $expectedHash = $checksumLine.Matches[0].Groups[1].Value.ToUpper()
          $actualHash = (Get-FileHash -Algorithm SHA256 "bin/yt-dlp.exe").Hash
          if ($actualHash -ne $expectedHash) {
            Write-Error "SHA-256 mismatch for yt-dlp.exe: expected $expectedHash, got $actualHash."
            exit 1
          }

      - name: Bundle Linux binaries
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p bin

          base_url="https://github.com/yt-dlp/yt-dlp/releases/download/${YTDLP_VERSION}"
          curl -fL "${base_url}/yt-dlp_linux" -o "bin/yt-dlp"
          curl -fL "${base_url}/SHA2-256SUMS" -o "bin/SHA2-256SUMS"
          expected_hash="$(grep -E '^[a-fA-F0-9]{64}[[:space:]]+\*?yt-dlp_linux$' bin/SHA2-256SUMS | head -n1 | awk '{print toupper($1)}')"
          if [ -z "${expected_hash}" ]; then
            echo "Could not find checksum for yt-dlp_linux in SHA2-256SUMS" >&2
            exit 1
          fi
          actual_hash="$(sha256sum bin/yt-dlp | awk '{print toupper($1)}')"
          if [ "${actual_hash}" != "${expected_hash}" ]; then
            echo "SHA-256 mismatch for yt-dlp Linux binary." >&2
            exit 1
          fi
          chmod +x bin/yt-dlp

          curl -fL "https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz" -o /tmp/ffmpeg-static.tar.xz
          tar -xf /tmp/ffmpeg-static.tar.xz -C /tmp
          ffmpeg_dir="$(find /tmp -maxdepth 1 -type d -name 'ffmpeg-*-amd64-static' | head -n1)"
          if [ -z "${ffmpeg_dir}" ] || [ ! -f "${ffmpeg_dir}/ffmpeg" ]; then
            echo "Failed to extract static ffmpeg binary." >&2
            exit 1
          fi
          cp "${ffmpeg_dir}/ffmpeg" "bin/ffmpeg"
          chmod +x bin/ffmpeg
          ./bin/ffmpeg -version | head -n1

      - name: Bundle macOS binaries
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p bin

          base_url="https://github.com/yt-dlp/yt-dlp/releases/download/${YTDLP_VERSION}"
          curl -fL "${base_url}/yt-dlp_macos" -o "bin/yt-dlp"
          curl -fL "${base_url}/SHA2-256SUMS" -o "bin/SHA2-256SUMS"
          expected_hash="$(grep -E '^[a-fA-F0-9]{64}[[:space:]]+\*?yt-dlp_macos$' bin/SHA2-256SUMS | head -n1 | awk '{print toupper($1)}')"
          if [ -z "${expected_hash}" ]; then
            echo "Could not find checksum for yt-dlp_macos in SHA2-256SUMS" >&2
            exit 1
          fi
          actual_hash="$(shasum -a 256 bin/yt-dlp | awk '{print toupper($1)}')"
          if [ "${actual_hash}" != "${expected_hash}" ]; then
            echo "SHA-256 mismatch for yt-dlp macOS binary." >&2
            exit 1
          fi
          chmod +x bin/yt-dlp

          curl -fL "https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip" -o /tmp/ffmpeg.zip
          unzip -q /tmp/ffmpeg.zip -d /tmp/ffmpeg-bin
          if [ ! -f /tmp/ffmpeg-bin/ffmpeg ]; then
            echo "Failed to extract macOS ffmpeg binary." >&2
            exit 1
          fi
          cp /tmp/ffmpeg-bin/ffmpeg bin/ffmpeg
          chmod +x bin/ffmpeg
          ./bin/ffmpeg -version | head -n1

      - name: Build Windows setup
        if: matrix.platform == 'windows'
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Linux AppImage
        if: matrix.platform == 'linux'
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build macOS DMG
        if: matrix.platform == 'macos'
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Windows setup artifact
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $setupFiles = Get-ChildItem -Path "release" -Filter "StreamFetch-Setup-*.exe" -File
          if (-not $setupFiles) {
            Write-Error "No Windows setup executable found in release/."
            exit 1
          }

          $packagedFfmpeg = Get-ChildItem -Path "release" -Filter "ffmpeg.exe" -File -Recurse |
            Where-Object { $_.FullName -match "\\resources\\bin\\ffmpeg\.exe$" } |
            Select-Object -First 1
          if (-not $packagedFfmpeg) {
            Write-Error "Packaged FFmpeg was not found under release/**/resources/bin/ffmpeg.exe."
            exit 1
          }
          if ($packagedFfmpeg.Length -lt 50MB) {
            Write-Error "Packaged FFmpeg is too small ($($packagedFfmpeg.Length) bytes)."
            exit 1
          }

      - name: Verify Linux AppImage artifact
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          compgen -G "release/*.AppImage" > /dev/null || {
            echo "No Linux AppImage found in release/." >&2
            exit 1
          }

      - name: Verify macOS DMG artifact
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          compgen -G "release/*.dmg" > /dev/null || {
            echo "No macOS DMG found in release/." >&2
            exit 1
          }

      - name: Upload Windows setup artifact
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: release/StreamFetch-Setup-*.exe
          if-no-files-found: error

      - name: Upload Linux AppImage artifact
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: release/*.AppImage
          if-no-files-found: error

      - name: Upload macOS DMG artifact
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: release/*.dmg
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets

      - name: Generate release notes from commits
        shell: pwsh
        run: |
          git fetch --tags --force

          $currentTag = $env:GITHUB_REF_NAME
          $currentRef = $currentTag
          $displayVersion = $currentTag

          $previousTag = ""
          $mergedTags = git tag --merged HEAD --sort=-creatordate
          foreach ($tag in $mergedTags) {
            if ($tag -eq $currentTag) { continue }
            $previousTag = $tag
            break
          }

          if (-not $previousTag) {
            $allTags = git tag --sort=-creatordate
            foreach ($tag in $allTags) {
              if ($tag -eq $currentTag) { continue }
              $previousTag = $tag
              break
            }
          }

          $header = @(
            "# StreamFetch $displayVersion",
            ""
          )

          $featureLines = @()
          $fixLines = @()
          $otherLines = @()
          $compareLine = ""

          if ($previousTag) {
            $range = "$previousTag..$currentRef"
            $compareLine = "- Compare: $($env:GITHUB_SERVER_URL)/$($env:GITHUB_REPOSITORY)/compare/$previousTag...$currentRef"
            $subjects = git log --no-merges --pretty=format:"%s" $range
          } else {
            $subjects = git log --no-merges --pretty=format:"%s" -n 50 $currentRef
          }

          foreach ($subject in $subjects) {
            $line = [string]$subject
            if ([string]::IsNullOrWhiteSpace($line)) { continue }
            $trimmed = $line.Trim()
            if ($trimmed -match "^(feat|feature)(\(.+\))?:") {
              $featureLines += "- $trimmed"
            } elseif ($trimmed -match "^(fix|hotfix)(\(.+\))?:") {
              $fixLines += "- $trimmed"
            } else {
              $otherLines += "- $trimmed"
            }
          }

          $notes = New-Object System.Collections.Generic.List[string]
          $header | ForEach-Object { [void]$notes.Add($_) }

          if ($previousTag) {
            [void]$notes.Add("- Base release: $previousTag")
          } else {
            [void]$notes.Add("- Base release: (first tagged release context not found)")
          }
          if ($compareLine) {
            [void]$notes.Add($compareLine)
          }
          [void]$notes.Add("")

          [void]$notes.Add("## Features")
          if ($featureLines.Count -gt 0) {
            $featureLines | ForEach-Object { [void]$notes.Add($_) }
          } else {
            [void]$notes.Add("- No feature-tagged commits found.")
          }
          [void]$notes.Add("")

          [void]$notes.Add("## Fixes")
          if ($fixLines.Count -gt 0) {
            $fixLines | ForEach-Object { [void]$notes.Add($_) }
          } else {
            [void]$notes.Add("- No fix-tagged commits found.")
          }
          [void]$notes.Add("")

          [void]$notes.Add("## Other Changes")
          if ($otherLines.Count -gt 0) {
            $otherLines | ForEach-Object { [void]$notes.Add($_) }
          } else {
            [void]$notes.Add("- No additional commit subjects found.")
          }

          $notes | Set-Content -Path "release-notes.md" -Encoding UTF8
          Write-Host "Generated release-notes.md"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          fail_on_unmatched_files: true
          body_path: release-notes.md
